services:
  - type: web
    name: gtps-gacha
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: admin123
    disk:
      name: data
      mountPath: /data
      sizeGB: 1